<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GVY 舰队成员大乱斗</title>
    <link rel="stylesheet" href="./assets/fleet-command.css?v=20260712-audit-fixes" />
    <style>
      html,
      body,
      body > main,
      .brawl-section,
      .member-brawl-terminal {
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      html,
      body,
      .member-brawl-terminal {
        overflow: hidden;
      }

      body::before {
        display: none;
      }

      .brawl-section {
        margin: 0;
        padding: 0;
      }

      .member-brawl-terminal {
        padding: clamp(14px, 1.55vw, 22px);
      }

      .command-brawl-field,
      .brawl-start-panel {
        inset: var(--brawl-field-top) 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="recruit-section brawl-section" id="recruit">
        <div class="member-brawl-terminal reveal" aria-label="舰队成员大乱斗">
          <div class="terminal-topline">
            <span>GVY // MEMBER ARENA</span>
            <span>JOIN READY</span>
          </div>
          <div class="member-brawl-heading">
            <p class="system-label">RECRUIT ARENA</p>
            <h2>舰队成员大乱斗，快快加入我们！</h2>
            <a
              class="hud-button hud-button-inline"
              href="https://robertsspaceindustries.com/en/orgs/GVY"
              target="_blank"
              rel="noreferrer"
            >
              <span>前往 RSI 组织页面</span>
              <small>RSI ORG / GVY</small>
            </a>
          </div>
          <div class="command-brawl-field tag-field" data-member-brawl-field aria-label="舰队成员大乱斗"></div>
          <div class="brawl-start-panel" data-brawl-start-panel>
            <button class="brawl-start-button" type="button" data-brawl-start>
              <span>开始战斗</span>
              <small>INITIATE MEMBER ARENA</small>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/vendor/matter.min.js?v=0.20.0" defer></script>
    <script src="./assets/fleet-command-brawl.js?v=20260712-audit-fixes" defer></script>
    <script src="./assets/fleet-command.js?v=20260712-audit-fixes" defer></script>
  </body>
</html>
